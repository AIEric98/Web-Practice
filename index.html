<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eric & Vicky | Our Roadmap</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfaf7;
            --accent-rose: #e7c6c6;
            --line-color: #d9c8b7;
            --text-main: #1a1a1a;
            --glass-bg: rgba(255, 255, 255, 0.6);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            overflow-y: hidden; 
            overflow-x: auto;
            color: var(--text-main);
        }

        .wrapper {
            display: inline-flex;
            align-items: center;
            height: 100vh;
            padding: 0 150px;
            position: relative;
            min-width: 5200px;
        }

        .hero-section { width: 550px; padding-right: 150px; flex-shrink: 0; z-index: 10; }
        h1 { font-family: 'Playfair Display', serif; font-size: 4.5rem; margin: 0; line-height: 1.1; }
        .couple-name { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.8rem; color: var(--accent-rose); margin-top: 15px; display: block; }

        /* Music Start Button */
        .music-start-btn {
            margin-top: 30px;
            padding: 15px 30px;
            background: var(--accent-rose);
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(231, 198, 198, 0.4);
        }
        .music-start-btn:hover { transform: scale(1.05); background: #deb4b4; }

        .roadmap-svg {
            position: absolute;
            top: 50%;
            left: 700px;
            width: 3800px;
            height: 200px;
            fill: none;
            stroke: var(--line-color);
            stroke-width: 3;
            stroke-dasharray: 10, 10;
            transform: translateY(-50%);
            z-index: 1;
        }

        .event-node {
            position: relative;
            z-index: 10;
            width: 320px;
            flex-shrink: 0;
            margin-right: 200px;
            display: flex;
            flex-direction: column;
        }

        .event-node:nth-child(odd) { margin-top: -300px; }
        .event-node:nth-child(even) { margin-top: 300px; }

        .image-preview {
            position: absolute;
            width: 300px;
            height: 200px;
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            bottom: 130%;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            border: 6px solid #fff;
        }

        .event-node:hover .image-preview { opacity: 1; transform: translateX(-50%) translateY(0); }

        .date-label { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 2rem; color: var(--accent-rose); }
        .location-label { font-weight: 600; border-bottom: 2px solid var(--accent-rose); display: inline-block; margin-bottom: 10px; }

        .finale-section {
            margin-left: 100px;
            text-align: center;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 1000px;
            z-index: 10;
        }

        .image-upload-box {
            min-height: 450px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 25px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid rgba(217, 200, 183, 0.3);
        }

        .couple-image { max-width: 90%; max-height: 500px; border-radius: 15px; display: none; margin-top: 20px; }

        .upload-trigger {
            cursor: pointer;
            padding: 40px 60px;
            border: 2px dashed var(--accent-rose);
            border-radius: 20px;
            color: var(--accent-rose);
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            background: var(--glass-bg);
            transition: 0.3s;
        }

        .controls { margin-top: 20px; display: none; gap: 15px; }
        .btn { padding: 12px 25px; border-radius: 50px; font-family: 'Inter', sans-serif; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
        .send-btn { background-color: var(--accent-rose); color: white; }
        .reset-btn { background-color: #eee; color: #666; }

        .adventure-tagline { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--accent-rose); font-style: italic; margin-top: 30px; }
    </style>
</head>
<body>

    <div id="player" style="display:none;"></div>

    <div class="wrapper">
        <div class="hero-section">
            <h1>Our Roadmap to the World</h1>
            <span class="couple-name">Eric & Vicky</span>
            <button id="startBtn" class="music-start-btn" onclick="startJourney()">Start Our Journey ♪</button>
        </div>

        <svg class="roadmap-svg" viewBox="0 0 3800 200" preserveAspectRatio="none">
            <path d="M0,100 C200,200 400,0 600,100 C800,200 1000,0 1200,100 C1400,200 1600,0 1800,100 C2000,200 2200,0 2400,100 C2600,200 2800,0 3000,100 C3200,200 3400,0 3800,100" />
        </svg>

        <div class="event-node">
            <div class="image-preview" style="background-image: url('https://images.unsplash.com/photo-1516251193007-45ef944ab0c6?q=80&w=600');"></div>
            <span class="date-label">June 2022</span>
            <span class="location-label">Tinder</span>
            <p style="font-size:0.9rem; color:#666;">Where it all began.</p>
        </div>

        <div class="event-node">
            <div class="image-preview" style="background-image: url('https://images.unsplash.com/photo-1502602898657-3e91760cbb34?q=80&w=600');"></div>
            <span class="date-label">Oct 2022</span>
            <span class="location-label">France</span>
            <p style="font-size:0.9rem; color:#666;">Exploring Paris together.</p>
        </div>

        <div class="event-node">
            <div class="image-preview" style="background-image: url('https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?q=80&w=600');"></div>
            <span class="date-label">June 2023</span>
            <span class="location-label">Tokyo</span>
            <p style="font-size:0.9rem; color:#666;">Neon lights and city nights.</p>
        </div>

        <div class="event-node">
            <div class="image-preview" style="background-image: url('https://images.unsplash.com/photo-1596400030017-744040a45e45?q=80&w=600');"></div>
            <span class="date-label">Oct 2023</span>
            <span class="location-label">Tainan</span>
            <p style="font-size:0.9rem; color:#666;">The historic heart of Taiwan.</p>
        </div>

        <div class="event-node">
            <div class="image-preview" style="background-image: url('https://images.unsplash.com/photo-1506973035872-a4ec16b8e8d9?q=80&w=600');"></div>
            <span class="date-label">March 2026</span>
            <span class="location-label">Sydney</span>
            <p style="font-size:0.9rem; color:#666;">Touching down in Australia.</p>
        </div>

        <div class="finale-section">
            <div class="image-upload-box">
                <img id="finalImg" src="#" alt="Our Adventure" class="couple-image">
                <label id="uploadBtn" for="fileInput" class="upload-trigger">upload your destination or your end story</label>
                <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFile(this)">
                <div id="controls" class="controls">
                    <button class="btn send-btn" onclick="sendEmail()">Email to Eric</button>
                    <button class="btn reset-btn" onclick="resetFinale()">Change Story</button>
                </div>
            </div>
            <div class="adventure-tagline">Since 2022 • Together, Anywhere</div>
        </div>
    </div>

    <script>
        // YouTube Player API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0',
                width: '0',
                videoId: 'Y4f8-1M2S_Y', // Head In The Clouds - 88rising
                playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': 'Y4f8-1M2S_Y' },
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady(event) {
            // Player is loaded and ready
        }

        function startJourney() {
            player.playVideo();
            document.getElementById('startBtn').style.opacity = '0';
            setTimeout(() => { document.getElementById('startBtn').style.display = 'none'; }, 300);
        }

        // Logic for File Upload and Scrolling
        const imgElement = document.getElementById('finalImg');
        const btnElement = document.getElementById('uploadBtn');
        const controls = document.getElementById('controls');

        window.onload = () => {
            const savedImg = localStorage.getItem('finaleImage');
            if (savedImg) showImage(savedImg);
        };

        function handleFile(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                localStorage.setItem('finaleImage', e.target.result);
                showImage(e.target.result);
            };
            if (file) reader.readAsDataURL(file);
        }

        function showImage(src) {
            imgElement.src = src;
            imgElement.style.display = "block";
            btnElement.style.display = "none"; 
            controls.style.display = "flex";
        }

        function resetFinale() {
            localStorage.removeItem('finaleImage');
            imgElement.style.display = "none";
            btnElement.style.display = "block";
            controls.style.display = "none";
        }

        function sendEmail() {
            window.location.href = `mailto:eric.yukan@gmail.com?subject=Our New Journey Destination&body=I updated the roadmap! Check it out.`;
        }

        window.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) {
                e.preventDefault();
                window.scrollBy({ left: e.deltaY * 3, behavior: 'auto' });
            }
        }, { passive: false });
    </script>
</body>
</html>
